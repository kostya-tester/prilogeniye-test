name: Build and Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install paramiko pyinstaller
    
    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed --name PKRV_Monitor --hidden-import paramiko main.py
    
    - name: Create release folder
      run: |
        mkdir release
        copy dist\PKRV_Monitor.exe release\
        copy database.py release\
        echo @echo off > release\запустить.bat
        echo cd /d "%%~dp0" >> release\запустить.bat
        echo start PKRV_Monitor.exe >> release\запустить.bat
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PKRV_Monitor_Release
        path: release/
        retention-days: 30
    
    - name: Create Release (only for tags)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: release/*
        body: |
          ## 🚀 PKRV Monitor ${{ github.ref_name }}
          
          ### 📦 Файлы:
          - `PKRV_Monitor.exe` - исполняемый файл
          - `database.py` - модуль БД
          - `запустить.bat` - запуск одним кликом
          
          ### 🖥 Как запустить:
          1. Скачайте все файлы в одну папку
          2. Запустите `запустить.bat` или `PKRV_Monitor.exe`
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
