name: Build PKRV_Monitor EXE

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5        # ← обновлено с v4
      
      - uses: actions/setup-python@v6    # ← обновлено с v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install paramiko pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --windowed --name PKRV_Monitor --hidden-import paramiko main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PKRV_Monitor
          path: dist/PKRV_Monitor.exe
