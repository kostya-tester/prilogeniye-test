name: Build PKRV_Monitor EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install paramiko pyinstaller

      - name: Build EXE
        shell: cmd
        run: |
          pyinstaller --onefile --windowed --name PKRV_Monitor --hidden-import paramiko main.py

      - name: Create release package
        shell: cmd
        run: |
          mkdir release
          copy dist\PKRV_Monitor.exe release\
          copy database.py release\
          echo @echo off > release\запустить.bat
          echo cd /d "%%~dp0" >> release\запустить.bat
          echo start PKRV_Monitor.exe >> release\запустить.bat
          echo. >> release\запустить.bat
          echo echo ============================= >> release\запустить.bat
          echo echo PKRV Monitor запущен >> release\запустить.bat
          echo echo ============================= >> release\запустить.bat

      - name: Upload release package
        uses: actions/upload-artifact@v4
        with:
          name: PKRV_Monitor_Release
          path: release/
