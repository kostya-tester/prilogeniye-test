name: Build PKRV_Monitor EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Show repository files
        shell: cmd
        run: |
          echo === Файлы в репозитории ===
          dir *.py

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install paramiko pyinstaller

      - name: Build EXE
        shell: cmd
        run: |
          if exist main.py (
            echo Building from main.py
            pyinstaller --onefile --windowed --name PKRV_Monitor --hidden-import paramiko main.py
          ) else if exist app.py (
            echo Building from app.py
            pyinstaller --onefile --windowed --name PKRV_Monitor --hidden-import paramiko app.py
          ) else if exist stands_monitor.py (
            echo Building from stands_monitor.py
            pyinstaller --onefile --windowed --name PKRV_Monitor --hidden-import paramiko stands_monitor.py
          ) else (
            echo ERROR: No Python file found!
            dir *.py
            exit /b 1
          )

      - name: Check build result
        shell: cmd
        run: dir dist\

      - uses: actions/upload-artifact@v4
        with:
          name: PKRV_Monitor
          path: dist/PKRV_Monitor.exe
