name: Build PKRV_Monitor EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Show repository files
        run: |
          echo "=== Файлы в репозитории ==="
          dir *.py

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install paramiko pyinstaller

      - name: Build EXE
        run: |
          echo "Поиск главного Python файла..."
          for %%f in (main.py app.py stands_monitor.py) do (
            if exist %%f (
              echo "Найден файл: %%f"
              pyinstaller --onefile --windowed --name PKRV_Monitor --hidden-import paramiko %%f
              goto :done
            )
          )
          echo "ОШИБКА: Не найден ни один из файлов: main.py, app.py, stands_monitor.py"
          exit /b 1
          :done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PKRV_Monitor
          path: dist/PKRV_Monitor.exe
