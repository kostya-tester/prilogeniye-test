name: Build PKRV_Monitor EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Show all Python files
        shell: cmd
        run: |
          echo ========================================
          echo ВСЕ PYTHON ФАЙЛЫ В РЕПОЗИТОРИИ:
          echo ========================================
          dir *.py /s /b
          echo ========================================

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install paramiko pyinstaller

      - name: Find and build EXE
        shell: pwsh
        run: |
          $files = @("main.py", "app.py", "stands_monitor.py")
          $found = $false
          foreach ($f in $files) {
            if (Test-Path $f) {
              Write-Host "Найден файл: $f"
              pyinstaller --onefile --windowed --name PKRV_Monitor --hidden-import paramiko $f
              $found = $true
              break
            }
          }
          if (-not $found) {
            Write-Host "ОШИБКА: Не найдены файлы main.py, app.py или stands_monitor.py"
            Write-Host "Проверьте имя вашего главного файла!"
            exit 1
          }

      - name: Create release package
        shell: cmd
        run: |
          mkdir release
          copy dist\PKRV_Monitor.exe release\
          copy database.py release\
          echo @echo off > release\запустить.bat
          echo cd /d "%%~dp0" >> release\запустить.bat
          echo start PKRV_Monitor.exe >> release\запустить.bat

      - uses: actions/upload-artifact@v4
        with:
          name: PKRV_Monitor_Release
          path: release/
